version: '3'
services:
  web:
    build: .
    expose:
      - "3000"
    volumes:
      - data:/app/data
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./certs:/etc/nginx/certs:ro
    depends_on:
      - web
volumes:
  data:
