name: it-landscape
services:
  web:
    build: .
    ports:
      - "3000:3000"
    volumes:
      - data:/app/data
    environment:
      NODE_ENV: production
      IT_LANDSCAPE_ENV: ${IT_LANDSCAPE_ENV:-development}
      NETBOX_URL: ${NETBOX_URL:-}
      NETBOX_TOKEN: ${NETBOX_TOKEN:-}
      NETBOX_TRIGRAMME_TAG_PREFIX: ${NETBOX_TRIGRAMME_TAG_PREFIX:-app:}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET:-dev-only-nextauth-secret-change-in-production}
      NEXTAUTH_URL: ${NEXTAUTH_URL:-http://localhost:3000}
      AUTH_ENABLED: ${AUTH_ENABLED:-true}
    depends_on:
      netbox:
        condition: service_started
        required: false

  postgres:
    image: postgres:15-alpine
    profiles: ["netbox"]
    environment:
      POSTGRES_DB: netbox
      POSTGRES_USER: netbox
      POSTGRES_PASSWORD: ${NETBOX_DB_PASSWORD:-netbox}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U netbox -d netbox"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    volumes:
      - netbox-postgres-data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    profiles: ["netbox"]
    command: ["redis-server", "--appendonly", "yes"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 10
    volumes:
      - netbox-redis-data:/data

  netbox:
    image: netboxcommunity/netbox:v4.3
    profiles: ["netbox"]
    command:
      - /bin/sh
      - -lc
      - |
        sh /opt/netbox/local/patch-settings.sh
        exec /opt/netbox/docker-entrypoint.sh /opt/netbox/launch-netbox.sh
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DB_HOST: postgres
      DB_NAME: netbox
      DB_USER: netbox
      DB_PASSWORD: ${NETBOX_DB_PASSWORD:-netbox}
      DB_PORT: 5432
      DB_WAIT_TIMEOUT: ${NETBOX_DB_WAIT_TIMEOUT:-120}
      DB_WAIT_DEBUG: ${NETBOX_DB_WAIT_DEBUG:-0}
      REDIS_HOST: redis
      REDIS_DATABASE: 0
      REDIS_CACHE_HOST: redis
      REDIS_CACHE_DATABASE: 1
      SECRET_KEY: ${NETBOX_SECRET_KEY:-dev-only-netbox-secret-key-not-for-production-xxxxxxxxxx}
      SUPERUSER_NAME: ${NETBOX_SUPERUSER_NAME:-admin}
      SUPERUSER_EMAIL: ${NETBOX_SUPERUSER_EMAIL:-admin@example.local}
      SUPERUSER_PASSWORD: ${NETBOX_SUPERUSER_PASSWORD:-password}
      SUPERUSER_API_TOKEN: ${NETBOX_SUPERUSER_API_TOKEN:-}
      ALLOWED_HOSTS: "*"
      CSRF_TRUSTED_ORIGINS: ${NETBOX_CSRF_TRUSTED_ORIGINS:-http://localhost:8080 https://localhost:8080 http://127.0.0.1:8080 https://127.0.0.1:8080 https://*.app.github.dev https://*.github.dev https://github.com}
      NETBOX_COOKIE_SECURE: ${NETBOX_COOKIE_SECURE:-false}
      NETBOX_COOKIE_SAMESITE: ${NETBOX_COOKIE_SAMESITE:-Lax}
      CSRF_COOKIE_NAME: ${NETBOX_CSRF_COOKIE_NAME:-netbox_csrftoken}
      SESSION_COOKIE_NAME: ${NETBOX_SESSION_COOKIE_NAME:-netbox_sessionid}
      SKIP_SUPERUSER: "false"
    volumes:
      - netbox-media-files:/opt/netbox/netbox/media
      - netbox-reports-files:/opt/netbox/netbox/reports
      - netbox-scripts-files:/opt/netbox/netbox/scripts
      - ./config/netbox/patch-settings.sh:/opt/netbox/local/patch-settings.sh:ro

volumes:
  data:
    name: it-landscape_data
  netbox-postgres-data:
    name: it-landscape_netbox-postgres-data
  netbox-redis-data:
    name: it-landscape_netbox-redis-data
  netbox-media-files:
    name: it-landscape_netbox-media-files
  netbox-reports-files:
    name: it-landscape_netbox-reports-files
  netbox-scripts-files:
    name: it-landscape_netbox-scripts-files
